<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadie's Boyfriend Selector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* The Simpsons Theme Styling */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body {
            background-color: #70D1FE; /* Springfield Sky Blue */
            font-family: 'Fredoka One', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
            color: #000;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Chunky Cartoon Containers */
        .card {
            background-color: #FFD90F; /* Classic Simpsons Yellow */
            border: 5px solid #000;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 8px 8px 0px #000;
        }

        .header {
            background-color: #FF69B4; /* Lard Lad Donut Pink */
            text-align: center;
            border: 5px solid #000;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 20px;
            box-shadow: 6px 6px 0px #000;
        }

        h1 {
            color: #FFF;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        h2 {
            margin-top: 0;
            border-bottom: 3px dashed #000;
            padding-bottom: 10px;
        }

        /* Form Elements */
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 18px;
        }

        input[type="text"], 
        select, 
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 3px solid #000;
            border-radius: 8px;
            font-family: 'Fredoka One', cursive;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #FFF;
        }

        /* Image Preview Box */
        .image-preview {
            width: 100%;
            height: 250px;
            border: 4px solid #000;
            border-radius: 10px;
            margin-bottom: 15px;
            background-color: #FFF;
            display: none; 
            overflow: hidden;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.1);
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slider-container {
            margin-bottom: 20px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        /* Chunky Buttons */
        button {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            font-family: 'Fredoka One', cursive;
            border: 4px solid #000;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s;
        }

        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }

        .btn-whatsapp {
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 15px;
        }

        .btn-save {
            background-color: #9B59B6; /* Purple */
            color: white;
            text-shadow: 2px 2px 0 #000;
        }
        
        .disclaimer {
            font-family: sans-serif;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="header">
        <h1>BOYFRIEND SELECTOR</h1>
    </div>

    <div class="card" id="dossier-card">
        <h2>1. Candidate Dossier</h2>
        
        <label for="pic">Capture Evidence (Photo):</label>
        <input type="file" id="pic" accept="image/*">
        
        <div class="image-preview" id="image-preview">
            <img id="suspect-photo" src="" alt="Suspect Evidence">
        </div>

        <label for="name">Suspect Name:</label>
        <input type="text" id="name" placeholder="First Name / Last Name">

        <label for="job">Employment Status:</label>
        <select id="job">
            <option value="Unknown">-- Select Industry --</option>
            <option value="Corporate Professional">Corporate / Business</option>
            <option value="Tech / IT">Software / Tech</option>
            <option value="Finance">Finance / Banking</option>
            <option value="Trades / Construction">Trades / Construction</option>
            <option value="Healthcare Professional">Healthcare / Medical</option>
            <option value="Creative Professional">Creative / Media / Arts</option>
            <option value="Service Industry">Hospitality / Service Industry</option>
            <option value="Self Employed">Self-Employed / Entrepreneur</option>
            <option value="Student">Full-time Student</option>
            <option value="Unemployed">Between Opportunities</option>
        </select>

        <label for="vibe">Looks & Vibe:</label>
        <select id="vibe">
            <option value="Unknown">-- Select Overall Vibe --</option>
            <option value="Golden Retriever">Golden Retriever Energy</option>
            <option value="Outdoorsy">Outdoorsy / Athletic</option>
            <option value="Preppy / Put Together">Preppy / Put Together</option>
            <option value="Grungy but Clean">Alternative / Edgy</option>
            <option value="Quiet / Introverted">Quiet / Introverted</option>
            <option value="Life of the Party">Life of the Party</option>
        </select>

        <div class="slider-container">
            <label for="red-flag">Red Flag Meter (1 = Angel, 10 = Run!): <span id="flag-value">5</span></label>
            <input type="range" id="red-flag" min="1" max="10" value="5" oninput="document.getElementById('flag-value').innerText = this.value">
        </div>
    </div>

    <div class="card">
        <h2>2. Approval Actions</h2>
        
        <button class="btn-whatsapp" onclick="sendToWhatsApp()">💬 SECURE TEXT TO DAD</button>
        <button class="btn-save" onclick="saveDossierImage()">💾 SAVE TO CAMERA ROLL</button>
        
        <div class="disclaimer">Saving downloads a PNG to your device. Dad's number is hidden securely.</div>
    </div>

</div>

<script>
    // --- HIDDEN DAD NUMBER ---
    // Change this to Dad's real WhatsApp number (include country code, but no +, spaces, or dashes. e.g., 15551234567)
    const DADS_SECRET_NUMBER = "+4407717872870"; 

    // Handle Image Preview
    document.getElementById('pic').addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('suspect-photo').src = e.target.result;
                document.getElementById('image-preview').style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    // Handle WhatsApp Sending
    function sendToWhatsApp() {
        const name = document.getElementById('name').value || "Unknown Suspect";
        const jobSelect = document.getElementById('job');
        const job = jobSelect.options[jobSelect.selectedIndex].text;
        const vibeSelect = document.getElementById('vibe');
        const vibe = vibeSelect.options[vibeSelect.selectedIndex].text;
        const flags = document.getElementById('red-flag').value;

        const message = `🚨 *BOYFRIEND SELECTOR APP* 🚨\n\nDad, a new candidate requires clearance.\n\n*Name:* ${name}\n*Employment:* ${job}\n*Vibe:* ${vibe}\n*Red Flag Level:* ${flags}/10\n\nPlease review the suspect and reply with your verdict:\n\n👍 APPROVE\n🔍 NEED MORE INTEL\n🚫 VETO`;

        const encodedMessage = encodeURIComponent(message);
        
        // The app now pulls the secret number from the code instead of the screen
        const cleanPhone = DADS_SECRET_NUMBER.replace(/[^0-9]/g, '');
        const whatsappUrl = `https://wa.me/${cleanPhone}?text=${encodedMessage}`;

        window.open(whatsappUrl, '_blank');
    }

    // Handle Image Saving
    function saveDossierImage() {
        const dossierCard = document.getElementById('dossier-card');
        const fileInput = document.getElementById('pic');
        const fileInputLabel = document.querySelector('label[for="pic"]');
        
        // Hide the file input button during capture
        fileInput.style.display = 'none';
        fileInputLabel.style.display = 'none';

        html2canvas(dossierCard, {
            backgroundColor: "#70D1FE", // Matches the Springfield sky blue background
            scale: 2, 
            borderRadius: 20
        }).then(canvas => {
            const link = document.createElement('a');
            const nameInput = document.getElementById('name').value || "suspect";
            link.download = `dossier-${nameInput}.png`; 
            link.href = canvas.toDataURL('image/png');
            link.click();

            // Put the file input button back on the screen
            fileInput.style.display = 'block';
            fileInputLabel.style.display = 'block';
        });
    }
</script>

</body>
</html>
