<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadie's Boyfriend Selector</title>
    <style>
        /* The Simpsons Theme Styling */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body {
            background-color: #70D1FE; 
            font-family: 'Fredoka One', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 20px;
            color: #000;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background-color: #FFD90F; 
            border: 5px solid #000;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 8px 8px 0px #000;
        }

        .header {
            background-color: #FF69B4; 
            text-align: center;
            border: 5px solid #000;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 20px;
            box-shadow: 6px 6px 0px #000;
        }

        h1 {
            color: #FFF;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        h2 {
            margin-top: 0;
            border-bottom: 3px dashed #000;
            padding-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 18px;
        }

        input[type="text"], 
        input[type="tel"], 
        select, 
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 3px solid #000;
            border-radius: 8px;
            font-family: 'Fredoka One', cursive;
            font-size: 16px;
            box-sizing: border-box;
        }

        .slider-container {
            margin-bottom: 20px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            font-family: 'Fredoka One', cursive;
            border: 4px solid #000;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s;
        }

        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }

        .btn-whatsapp {
            background-color: #25D366; /* WhatsApp Green */
            color: white;
            text-shadow: 2px 2px 0 #000;
            margin-top: 10px;
        }
        
        .disclaimer {
            font-family: sans-serif;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="header">
        <h1>SADIE'S BOYFRIEND SELECTOR</h1>
    </div>

    <!-- Phase 1: The Dossier -->
    <div class="card" id="dossier-card">
        <h2>1. Candidate Dossier</h2>
        
        <label for="pic">Capture Evidence (Photo):</label>
        <input type="file" id="pic" accept="image/*">

        <label for="name">Suspect Name:</label>
        <input type="text" id="name" placeholder="e.g., Milhouse">

        <label for="job">Employment Status:</label>
        <select id="job">
            <option value="Unknown">-- Select One --</option>
            <option value="Gainfully Employed">Gainfully Employed</option>
            <option value="Nuclear Power Plant Worker">Nuclear Power Plant Worker</option>
            <option value="Aspiring DJ">Aspiring DJ / Musician</option>
            <option value="Bartender">Bartender at Moe's</option>
            <option value="Professional Student">Professional Student</option>
        </select>

        <label for="vibe">Looks & Vibe:</label>
        <select id="vibe">
            <option value="Unknown">-- Select One --</option>
            <option value="Skater Boy">Skater Boy</option>
            <option value="Lovable Nerd">Lovable Nerd</option>
            <option value="Finance Bro">Finance Bro</option>
            <option value="Golden Retriever">Golden Retriever Energy</option>
        </select>

        <div class="slider-container">
            <label for="red-flag">Red Flag Meter (1 = Angel, 10 = Run!): <span id="flag-value">5</span></label>
            <input type="range" id="red-flag" min="1" max="10" value="5" oninput="document.getElementById('flag-value').innerText = this.value">
        </div>
    </div>

    <!-- Phase 2: WhatsApp Integration -->
    <div class="card">
        <h2>2. Dispatch to Dad</h2>
        <label for="dad-phone">Dad's WhatsApp # (Optional):</label>
        <input type="tel" id="dad-phone" placeholder="e.g., 15551234567 (No +, dashes, or spaces)">
        
        <button class="btn-whatsapp" onclick="sendToWhatsApp()">💬 TEXT DAD FOR APPROVAL</button>
        <div class="disclaimer">Dad will receive a formatted report to review!</div>
    </div>

</div>

<script>
    function sendToWhatsApp() {
        // Gather the data from the dossier
        const name = document.getElementById('name').value || "Unknown Suspect";
        
        const jobSelect = document.getElementById('job');
        const job = jobSelect.options[jobSelect.selectedIndex].text;
        
        const vibeSelect = document.getElementById('vibe');
        const vibe = vibeSelect.options[vibeSelect.selectedIndex].text;
        
        const flags = document.getElementById('red-flag').value;
        const phone = document.getElementById('dad-phone').value;

        // Format the message for WhatsApp
        const message = `🚨 *SADIE'S BOYFRIEND SELECTOR* 🚨\n\nDad, a new candidate requires clearance.\n\n*Name:* ${name}\n*Employment:* ${job}\n*Vibe:* ${vibe}\n*Red Flag Level:* ${flags}/10\n\nPlease review the suspect and reply with your verdict:\n\n👍 APPROVE\n🔍 NEED MORE INTEL\n🚫 VETO`;

        // Encode the message so it works in a URL
        const encodedMessage = encodeURIComponent(message);
        
        // Build the WhatsApp link
        let whatsappUrl = `https://wa.me/?text=${encodedMessage}`;
        
        // If a phone number was entered, route it directly to that chat
        if (phone) {
            // Strips out any accidental spaces or dashes the user might type
            const cleanPhone = phone.replace(/[^0-9]/g, '');
            whatsappUrl = `https://wa.me/${cleanPhone}?text=${encodedMessage}`;
        }

        // Open WhatsApp in a new tab/app
        window.open(whatsappUrl, '_blank');
    }
</script>

</body>
</html>
