<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>County Coatings Powder Stock</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900 antialiased pb-12">

    <!-- Header -->
    <header class="bg-slate-800 text-white pt-8 pb-4 px-4 sticky top-0 shadow-md z-10">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>
                <h1 class="text-xl font-bold tracking-tight">County Coatings</h1>
                <p class="text-xs text-slate-400">Powder Stock Control</p>
            </div>
            <button onclick="toggleModal(true)" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-1.5 px-3 rounded-lg text-sm transition">
                + Add Powder
            </button>
        </div>
    </header>

    <!-- Main Mobile Container -->
    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- Search Bar -->
        <div class="relative">
            <input type="text" id="searchInput" oninput="renderStock()" placeholder="Search RAL, finish, name..." 
                   class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 pl-10 shadow-sm focus:outline-none focus:ring-2 focus:ring-slate-500 text-base">
            <span class="absolute left-3 top-3.5 text-gray-400">🔍</span>
        </div>

        <!-- Stock List Container -->
        <div id="stockList" class="space-y-3">
            <!-- Powder items injected by JavaScript -->
        </div>
    </main>

    <!-- Add Item Modal -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl">
            <h3 class="text-lg font-bold mb-4">Add New Powder</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Powder Name / RAL</label>
                    <input type="text" id="itemName" placeholder="e.g., RAL 7016" class="w-full border border-gray-300 rounded-lg p-2 text-base">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Finish (Optional)</label>
                    <input type="text" id="itemFinish" placeholder="e.g., Matt, Gloss, Satin" class="w-full border border-gray-300 rounded-lg p-2 text-base">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Current Stock (Boxes)</label>
                    <input type="number" id="itemQty" value="2" class="w-full border border-gray-300 rounded-lg p-2 text-base">
                </div>
            </div>
            <div class="flex space-x-3 mt-6">
                <button onclick="toggleModal(false)" class="w-1/2 bg-gray-200 text-gray-700 py-2.5 rounded-lg font-medium">Cancel</button>
                <button onclick="addItem()" class="w-1/2 bg-slate-800 text-white py-2.5 rounded-lg font-medium">Save Powder</button>
            </div>
        </div>
    </div>

    <!-- App Logic -->
    <script>
        // Pre-loaded County Coatings Inventory
        const defaultPowders = [
            { id: "p1", name: "Axalta Steel Prime", finish: "Primer", qty: 2 },
            { id: "p2", name: "RAL 1003", finish: "Matt", qty: 2 },
            { id: "p3", name: "RAL 1013", finish: "Gloss", qty: 2 },
            { id: "p4", name: "RAL 1023", finish: "Matt", qty: 2 },
            { id: "p5", name: "RAL 3002", finish: "Matt", qty: 2 },
            { id: "p6", name: "RAL 5017", finish: "Gloss", qty: 2 },
            { id: "p7", name: "RAL 6001", finish: "Gloss", qty: 2 },
            { id: "p8", name: "RAL 6005", finish: "Matt", qty: 2 },
            { id: "p9", name: "RAL 7016", finish: "Matt", qty: 2 },
            { id: "p10", name: "RAL 7024", finish: "Gloss", qty: 2 },
            { id: "p11", name: "RAL 9005", finish: "Matt", qty: 2 },
            { id: "p12", name: "RAL 9005", finish: "Satin", qty: 2 },
            { id: "p13", name: "RAL 9005", finish: "Gloss", qty: 2 },
            { id: "p14", name: "RAL 9010", finish: "Matt", qty: 2 },
            { id: "p15", name: "RAL 9010", finish: "Satin", qty: 2 },
            { id: "p16", name: "RAL 9010", finish: "Gloss", qty: 2 },
            { id: "p17", name: "BS08E51", finish: "Gloss", qty: 2 },
            { id: "p18", name: "Sands Orange", finish: "Specialty", qty: 2 },
            { id: "p19", name: "Wheel Silver", finish: "Specialty", qty: 2 }
        ];

        let inventory = JSON.parse(localStorage.getItem('cc_inventory')) || defaultPowders;

        function saveToStorage() {
            localStorage.setItem('cc_inventory', JSON.stringify(inventory));
        }

        function toggleModal(show) {
            document.getElementById('addModal').classList.toggle('hidden', !show);
            if(!show) {
                document.getElementById('itemName').value = '';
                document.getElementById('itemFinish').value = '';
                document.getElementById('itemQty').value = '2';
            }
        }

        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const finish = document.getElementById('itemFinish').value.trim();
            const qty = parseInt(document.getElementById('itemQty').value) || 0;

            if (!name) return alert('Powder name or RAL code is required.');

            inventory.push({
                id: Date.now().toString(),
                name: name,
                finish: finish || 'Standard',
                qty: qty
            });

            saveToStorage();
            renderStock();
            toggleModal(false);
        }

        function updateQty(id, change) {
            const item = inventory.find(i => i.id === id);
            if (item) {
                item.qty = Math.max(0, item.qty + change);
                saveToStorage();
                renderStock();
            }
        }

        function deleteItem(id) {
            if(confirm("Remove this powder coating variant permanently?")) {
                inventory = inventory.filter(i => i.id !== id);
                saveToStorage();
                renderStock();
            }
        }

        function renderStock() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('stockList');
            container.innerHTML = '';

            const filtered = inventory.filter(item => 
                item.name.toLowerCase().includes(searchTerm) || 
                item.finish.toLowerCase().includes(searchTerm)
            );

            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">No powders matching your search.</div>`;
                return;
            }

            filtered.forEach(item => {
                const isLow = item.qty <= 1;
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-xs border border-gray-100 flex justify-between items-center";
                card.innerHTML = `
                    <div class="space-y-1 pr-2 max-w-[60%]">
                        <h4 class="font-bold text-slate-800 text-base leading-tight">${item.name}</h4>
                        <div class="flex items-center gap-2">
                            <span class="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-medium">${item.finish}</span>
                            ${isLow ? '<span class="text-[10px] bg-amber-100 text-amber-800 font-bold px-1.5 py-0.5 rounded uppercase tracking-wider">Low Stock</span>' : ''}
                        </div>
                        <button onclick="deleteItem('${item.id}')" class="text-xs text-red-400 pt-2 block hover:underline">Delete</button>
                    </div>
                    <div class="flex items-center space-x-2.5">
                        <button onclick="updateQty('${item.id}', -1)" class="w-11 h-11 bg-gray-100 active:bg-gray-200 rounded-xl font-bold text-xl text-gray-600 flex items-center justify-center">-</button>
                        <span class="w-10 text-center font-black text-xl ${isLow ? 'text-amber-600' : 'text-slate-800'}">${item.qty}</span>
                        <button onclick="updateQty('${item.id}', 1)" class="w-11 h-11 bg-slate-800 active:bg-slate-700 rounded-xl font-bold text-xl text-white flex items-center justify-center">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Run on load
        renderStock();
    </script>
</body>
</html>
